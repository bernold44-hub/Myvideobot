<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Generator Bot</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .chat-container {
            background-color: #2a2a40;
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            padding: 20px;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            margin-top: 0;
            color: #00e5ff;
        }
        .config-box {
            background-color: #1e1e2f;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #3d3d5c;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group:last-child {
            margin-bottom: 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #aeb2d5;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            background-color: #2a2a40;
            border: 1px solid #5a5a8a;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #00e5ff;
        }
        .chat-box {
            height: 350px;
            overflow-y: auto;
            background-color: #1e1e2f;
            border: 1px solid #3d3d5c;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            max-width: 85%;
            word-wrap: break-word;
        }
        .bot {
            background-color: #3d3d5c;
            color: white;
            align-self: flex-start;
        }
        .user {
            background-color: #00e5ff;
            color: #1e1e2f;
            align-self: flex-end;
            font-weight: 500;
        }
        video {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 10px;
            border: 2px solid #00e5ff;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex-grow: 1;
            margin-bottom: 0;
        }
        button {
            background-color: #00e5ff;
            color: #1e1e2f;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #00b3cc;
        }
        .error-text {
            color: #ff4d4d;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <h2>AI Video Generator Bot</h2>
        
        <div class="config-box">
            <div class="input-group">
                <label for="apiKey">Your API Key</label>
                <input type="password" id="apiKey" placeholder="Paste your free API key here...">
            </div>
            <div class="input-group">
                <label for="apiUrl">API Endpoint URL</label>
                <input type="text" id="apiUrl" value="https://api.kie.ai/api/v1/jobs/createTask" placeholder="e.g., https://api.kie.ai/api/v1/jobs/createTask">
            </div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message bot">
                Hi! Setup your API Key above. Then type a prompt below (e.g., "A cinematic shot of a lion roaring") and hit Send!
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="prompt" placeholder="Type your video idea here...">
            <button onclick="generateVideo()">Send</button>
        </div>
    </div>

    <script>
        async function generateVideo() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const apiUrl = document.getElementById('apiUrl').value.trim();
            const prompt = document.getElementById('prompt').value.trim();
            const chatBox = document.getElementById('chatBox');

            if (!apiKey || !apiUrl || !prompt) {
                alert("Please fill in the API Key, API Endpoint URL, and your Prompt.");
                return;
            }

            // Show user's prompt in the chat
            chatBox.innerHTML += `<div class="message user">${prompt}</div>`;
            document.getElementById('prompt').value = ''; 
            
            // Show loading message
            const loadingId = 'loading-' + Date.now();
            chatBox.innerHTML += `<div class="message bot" id="${loadingId}">
                ⏳ Sending request to API...
            </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Sending the request to the API with the updated JSON structure
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "kling", 
                        input: {
                            prompt: prompt
                        }
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                // Logic to display the response
                const videoUrl = data.url || data.video_url || (data.data && data.data.url);
                const taskId = data.taskId || data.task_id || (data.data && data.data.taskId);

                if (videoUrl && (videoUrl.startsWith('http') || videoUrl.endsWith('.mp4'))) {
                    // If video URL is directly provided
                    chatBox.innerHTML += `
                        <div class="message bot">
                            ✅ Video Generated Successfully:<br>
                            <video controls autoplay loop>
                                <source src="${videoUrl}" type="video/mp4">
                                Your browser does not support the video tag.
                            </video>
                        </div>`;
                } else if (taskId) {
                    // If the API returns a Task ID instead of a direct video (Async generation)
                    chatBox.innerHTML += `
                        <div class="message bot" style="border: 1px solid #00e5ff;">
                            🔄 <b>Task Submitted Successfully!</b><br>
                            The AI is creating your video. It takes a few minutes.<br>
                            <b>Your Task ID is:</b> <code>${taskId}</code><br><br>
                            <i>(Since this API processes videos in the background, you might need a separate API call to check the status using this Task ID.)</i><br><br>
                            <b>Full Response:</b><br>
                            <code style="font-size: 11px;">${JSON.stringify(data)}</code>
                        </div>`;
                } else {
                    // Show raw response if format is unknown or there's an error
                    chatBox.innerHTML += `
                        <div class="message bot" style="border: 1px solid #ff4d4d;">
                            ⚠️ Request went through, but output format is unknown.<br><br>
                            <b>API Response:</b><br>
                            <code style="font-size: 11px;">${JSON.stringify(data)}</code>
                        </div>`;
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                chatBox.innerHTML += `
                    <div class="message bot" style="border: 1px solid #ff4d4d; color: #ff4d4d;">
                        ❌ <b>Network Error:</b> ${error.message}<br>
                        Make sure your API URL is correct and the provider allows browser requests (CORS).
                    </div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById("prompt").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                generateVideo();
            }
        });
    </script>
</body>
</html>
